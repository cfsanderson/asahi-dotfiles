# bind = SUPER SHIFT, R, exec, ~/.config/hypr/scripts/reload.sh  # TODO: create reload.sh script
bind = SUPER, P, exec, $passwordManager

  # --- Keyboard Backlight Control ---
  bind = , XF86KbdBrightnessDown, exec, brightnessctl -d kbd_backlight set 5%-
  bind = , XF86KbdBrightnessUp, exec, brightnessctl -d kbd_backlight set 5%+
  bind = , F3, exec, brightnessctl -d kbd_backlight set 5%-
  bind = , F4, exec, brightnessctl -d kbd_backlight set 5%+

# Start default apps
bind = SUPER, return, exec, $terminal
bind = SUPER, F, exec, $fileManager
bind = SUPER, B, exec, $browser
bind = SUPER, C, exec, $claude
bind = SUPER, M, exec, $mail
bind = SUPER, N, exec, $terminal -e nvim
bind = SUPER, T, exec, $terminal -e btop
bind = SUPER, D, exec, $terminal -e lazydocker
bind = SUPER, G, exec, $messenger
bind = SUPER, S, exec, signal-desktop
bind = SUPER, O, exec, flatpak run md.obsidian.Obsidian --force-device-scale-factor=2
bind = SUPER, slash, exec, $passwordManager

bind = SUPER, space, exec, $HOME/.config/hypr/scripts/launch-wofi.sh
bind = SUPER SHIFT, SPACE, exec, pkill -SIGUSR1 waybar
# bind = SUPER CTRL, SPACE, exec, ~/.local/share/omarchy/bin/swaybg-next  # omarchy not installed
# bind = SUPER SHIFT CTRL, SPACE, exec, ~/.local/share/omarchy/bin/omarchy-theme-next  # omarchy not installed

bind = SUPER, W, killactive,

# Go Fullscreen
bind = , F11, fullscreen

# End active session
bind = SUPER, ESCAPE, exec, hyprlock
bind = SUPER SHIFT, ESCAPE, exec, systemctl suspend
bind = SUPER ALT, ESCAPE, exit,
bind = SUPER CTRL, ESCAPE, exec, reboot
bind = SUPER SHIFT CTRL, ESCAPE, exec, systemctl poweroff

# Control tiling
bind = SUPER, semicolon, togglesplit, # dwindle
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, V, togglefloating,

# Move focus with mainMod + arrow keys
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
# Uses handle-monitor.sh to focus the correct monitor first (1-5 laptop, 6-10 external)
$switchWs = ~/.config/hypr/scripts/handle-monitor.sh switch
bind = SUPER, 1, exec, $switchWs 1
bind = SUPER, 2, exec, $switchWs 2
bind = SUPER, 3, exec, $switchWs 3
bind = SUPER, 4, exec, $switchWs 4
bind = SUPER, 5, exec, $switchWs 5
bind = SUPER, 6, exec, $switchWs 6
bind = SUPER, 7, exec, $switchWs 7
bind = SUPER, 8, exec, $switchWs 8
bind = SUPER, 9, exec, $switchWs 9
bind = SUPER, 0, exec, $switchWs 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Swap active window with the one next to it with mainMod + SHIFT + arrow keys
bind = SUPER SHIFT, h, swapwindow, l
bind = SUPER SHIFT, l, swapwindow, r
bind = SUPER SHIFT, k, swapwindow, u
bind = SUPER SHIFT, j, swapwindow, d

# Resize active window
bind = SUPER, minus, resizeactive, -100 0
bind = SUPER, equal, resizeactive, 100 0
bind = SUPER SHIFT, minus, resizeactive, 0 -100
bind = SUPER SHIFT, equal, resizeactive, 0 100

# Focus the other monitor
bind = SUPER, comma, focusmonitor, l
bind = SUPER, period, focusmonitor, r

# Move active window to the other monitor
bind = SUPER SHIFT, comma, movewindow, mon:l
bind = SUPER SHIFT, period, movewindow, mon:r

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Control Apple Display brightness (omarchy not installed — needs replacement)
# bind = CTRL, F1, exec, ~/.local/share/omarchy/bin/apple-display-brightness -5000
# bind = CTRL, F2, exec, ~/.local/share/omarchy/bin/apple-display-brightness +5000
# bind = SHIFT CTRL, F2, exec, ~/.local/share/omarchy/bin/apple-display-brightness +60000

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshots (grim + slurp) — Mac-style: Shift+3/4/W/F
bind = SUPER SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = SUPER SHIFT, W, exec, ~/.config/hypr/scripts/screenshot.sh window
bind = SUPER SHIFT, F, exec, ~/.config/hypr/scripts/screenshot.sh output

# Screen recording (wf-recorder) — toggle region or full screen
# SUPER+ALT+R        toggles region recording (select area with crosshair, press again to stop)
# SUPER+ALT+SHIFT+R  toggles full-screen recording (press again to stop)
bind = SUPER ALT, R, exec, ~/.config/hypr/scripts/record.sh region
bind = SUPER ALT SHIFT, R, exec, ~/.config/hypr/scripts/record.sh output

# Color picker (hyprpicker not available on Fedora ARM64)
# bind = SUPER SHIFT, C, exec, hyprpicker -a

# Clipse
bind = CTRL SUPER, V, exec, $terminal --class clipse -e clipse
